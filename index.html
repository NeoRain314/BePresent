<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Be Present</title>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand" data-i18n="brand">Be Present</div>
        <nav class="tabs">
          <button class="tab is-active" data-i18n="tabs.presentations">My Presentations</button>
          <button class="tab" data-i18n="tabs.practice">Practice</button>
          <button class="tab" data-i18n="tabs.customization">Customization</button>
        </nav>
        <div class="actions">
          <button id="start-presentation-btn" class="btn btn-primary" data-i18n="actions.startPresentation">Start Presentation</button>
          <button id="new-presentation-btn" class="btn" data-i18n="actions.newPresentation">+ New Presentation</button>
        </div>
      </header>

      <main>
        <section id="presentation-list" class="presentation-list"></section>
      </main>
    </div>

    <div id="start-modal" class="modal-backdrop" hidden>
      <div class="modal">
        <h2 data-i18n="modal.title">Presentation Selection</h2>
        <label>
          <span data-i18n="modal.presentationLabel">Presentation</span>
          <select id="presentation-select"></select>
        </label>
        <label>
          <span data-i18n="modal.roomLabel">Room</span>
          <select id="room-select"></select>
        </label>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn" data-i18n="actions.cancel">Cancel</button>
          <button id="modal-start" class="btn btn-primary" data-i18n="actions.start">Start</button>
        </div>
      </div>
    </div>

    <div id="info-modal" class="modal-backdrop" hidden>
      <div class="modal">
        <h2 data-i18n="infoModal.title">Edit presentation info</h2>
        <label>
          <span data-i18n="infoModal.dateLabel">Date</span>
          <input id="info-date" type="date" />
        </label>
        <label>
          <span data-i18n="infoModal.extraInfoLabel">Extra information</span>
          <textarea id="info-extra" rows="5" data-i18n-placeholder="infoModal.extraInfoPlaceholder" placeholder="Add notes, goals, or context for this presentation."></textarea>
        </label>
        <div class="modal-actions">
          <button id="info-cancel" class="btn" data-i18n="actions.cancel">Cancel</button>
          <button id="info-save" class="btn btn-primary" data-i18n="actions.save">Save</button>
        </div>
      </div>
    </div>

    <div id="vr-root" class="vr-root" hidden></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
